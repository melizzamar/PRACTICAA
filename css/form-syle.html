<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
    <div class="container" style="background-color: bisque;">
        <div class="row"></div>
             <div class="col">
                <div class="card shadow p-4 mx-auto" style="max-width: 550px;">
                <h1>Formulario de Registro</h1>
                   <form action="form.html" method="post">
                     
                     <!--Nombre Completo-->
                     <div class="mb-3">
                     <label for="txtnombre" class="form-label">Nombre Completo:</label>
                    <input type="text" class="form-control" id="txtnombre" placeholder="Ej.Juan Perez" required>
                     </div>

        <!--Numero de telefono-->
        <div class="mb-3">
        <label for="txttel">Num de telefono:</label>
        <input type="text" class="form-control" id="txtnombre" name="txtnombre">
        <input type="tel" id="txttel" name="txttel" required 
        pattern="[0-9]{10}"
        placeholder="10 digitos (Ej 8123456789)">
        </div>
        
        <!--Correo Electronico-->
        <div class="mb-3">
        <label for="textemail"class="form-label">Direccion de correo:</label>
        <div class="input-group">
        <span class="input-group-text">@</span>
        <input type="email" class="form-control" id="txtemail" name="txtemail"
             placeholder="ejemplo@correo.com" required>
        </div>

        <!--Contraseña-->
        <label for="txtnombre">Ingrese contraseña</label>
        <input type="password" id="txtpass"name="txtpass" 
        placeholder="Minimo 8 caracteres" required>
       

        <label for="txtpass">Confirmar contraseña</label>
        <input type="password" id="txtpass" name="txtpass" 
        placeholder="Repite tu contraseña" required>
         </div>

        <!--Fecha de nacimiento-->
        <div></div>
         <label for="fecha-nac">Selecciona fecha de nacimiento</label>
        <input type="date" id="fecha-nac" name="fecha-nac">

        <input type="submit" value="Registrar">
  
        <!--Genero-->
        <p>Genero</p>
        <div class="form-check">
        <input type="radio" class="form-check-input" id="Hombre" name="genero" value="Hombre">
        <label for="Hombre" class="form-check-label">Hombre</label>
        </div>


        <div class="form-check">
        <input type="radio" id="mujer" class="form-check-input" id="otro" name="genero" value="mujer"> 
        <label for="mujer" class="form-check-label">Mujer</label>
        </div>


        <div class="form-check">
        <input type="radio" id="Otro" class="form-check-input" id="otro" name="genero" value="Otro"> 
        <label for="Otro" class="form-check-label">Otro</label>
        </div>

    
        <!---Terminos y condiciones-->
        <div class="form-check mt-3 mb-3">
        <input type="checkbox" class="form-check-input" id="terminos" name="terminos"required>
        <label for="terminos" class="form-check-label">Acepto los terminos y condiciones</label>
         <div>



            <!--Boton-->
        <input type="submit" value="Registrar">
    
    </form>

    <div>

</div>






    <script src="js/bootstrap.min.js"></script>
</body>
</html>
